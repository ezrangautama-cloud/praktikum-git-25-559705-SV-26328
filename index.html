<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sewa Kendaraan Murah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero { background: #f8f9fa; padding: 60px 0; }
        .vehicle-card { margin-bottom: 20px; }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            padding: 1rem 2rem;
            color: white;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #ffcc00; /* Warna aksen saat hover */
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">EzraRent.</div>
        <ul class="nav-links">
            <li><a href="#">Beranda</a></li>
            <li><a href="#">Katalog Mobil</a></li>
            <li><a href="#">Cara Sewa</a></li>
            <li><a href="#">Kontak</a></li>
        </ul>
    </nav>

    <div class="hero text-center">
        <h1>Temukan Kendaraan Impian Anda</h1>
        <p>Sewa mobil dan motor dengan proses cepat dan harga bersahabat.</p>
    </div>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-4 vehicle-card">
                <div class="card">
                    <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Mobil">
                    <div class="card-body">
                        <h5 class="card-title">Toyota Avanza</h5>
                        <p class="card-text">Rp 350.000 / hari</p>
                        <a href="#" class="btn btn-primary">Sewa Sekarang</a>
                    </div>
                </div>
            </div>
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
